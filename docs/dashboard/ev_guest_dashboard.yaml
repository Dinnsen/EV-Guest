type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: separator
    name: EV Guest
    icon: mdi:car-electric

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        entity: text.ev_guest_license_plate
        name: License Plate
        icon: mdi:card-text-outline
        button_type: name
      - type: custom:bubble-card
        card_type: button
        entity: button.ev_guest_grab_car_data
        name: Grab Car Data
        icon: mdi:car-search
      - type: custom:bubble-card
        card_type: button
        entity: number.ev_guest_battery_capacity
        name: Capacity
        icon: mdi:car-electric
      - type: custom:bubble-card
        card_type: button
        entity: number.ev_guest_soc
        name: SoC
        icon: mdi:battery-50
      - type: custom:bubble-card
        card_type: button
        entity: number.ev_guest_charge_limit
        name: Limit
        icon: mdi:battery-arrow-up
      - type: custom:bubble-card
        card_type: button
        entity: text.ev_guest_charge_completion_time
        name: Charge Completion Time
        icon: mdi:clock-check-outline
      - type: custom:bubble-card
        card_type: button
        entity: switch.ev_guest_use_charge_completion_time
        name: Use Completion Time
        icon: mdi:clock-check-outline
      - type: custom:bubble-card
        card_type: button
        entity: switch.ev_guest_enable_charger_control
        name: Charger Control
        icon: mdi:ev-station
      - type: custom:bubble-card
        card_type: button
        entity: switch.ev_guest_continuous_charging_preferred
        name: Continuous Charging Preferred
        icon: mdi:timeline-clock-outline
      - type: custom:bubble-card
        card_type: button
        entity: button.ev_guest_calculate
        name: Calculate
        icon: mdi:calculator

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        entity: sensor.ev_guest_charging_speed
        name: Charging Speed
        show_state: true
      - type: custom:bubble-card
        card_type: button
        entity: sensor.ev_guest_charge_costs
        name: Charge Costs
        show_state: true
      - type: custom:bubble-card
        card_type: button
        entity: sensor.ev_guest_charge_start_time
        name: Charge Start Time
        show_state: true
      - type: custom:bubble-card
        card_type: button
        entity: sensor.ev_guest_charge_end_time
        name: Charge End Time
        show_state: true
      - type: custom:bubble-card
        card_type: button
        entity: sensor.ev_guest_charge_time
        name: Charge Time
        show_state: true
      - type: custom:bubble-card
        card_type: button
        entity: sensor.ev_guest_status
        name: Status
        show_state: true

  - type: custom:vertical-stack-in-card
    cards:
      - type: markdown
        content: |
          ### <ha-icon icon="mdi:hours-24"></ha-icon>&nbsp;&nbsp;Planned charging
      - type: custom:apexcharts-card
        now:
          show: true
          label: Now
        locale: en
        header:
          show: false
        graph_span: 2d
        span:
          start: day
        yaxis:
          - min: ~0
            max: 1.2
        apex_config:
          legend:
            show: false
          chart:
            height: 245px
          xaxis:
            labels:
              show: true
              format: HH
              rotate: -45
              rotateAlways: true
              hideOverlappingLabels: true
              style:
                fontSize: 10
          dataLabels:
            enabled: false
        series:
          - entity: sensor.ev_guest_status
            name: Electricity price
            type: line
            float_precision: 2
            extend_to: false
            data_generator: |
              return (entity.attributes.raw_two_days || []).map((entry) => [
                new Date(entry.start).getTime(),
                parseFloat(entry.value)
              ]);
          - entity: sensor.ev_guest_status
            name: Charging schedule
            type: area
            curve: stepline
            extend_to: false
            stroke_width: 2
            data_generator: |
              return (entity.attributes.charging_schedule || []).map((entry) => [
                new Date(entry.start).getTime(),
                parseFloat(entry.value)
              ]);
