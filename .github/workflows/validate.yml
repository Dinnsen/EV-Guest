name: Validate

on:
  push:
  pull_request:

jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check custom component structure
        run: |
          test -f custom_components/ev_guest/manifest.json
          test -f custom_components/ev_guest/__init__.py
          test -f custom_components/ev_guest/config_flow.py
          test -f custom_components/ev_guest/coordinator.py
          test -f README.md
          test -f hacs.json
